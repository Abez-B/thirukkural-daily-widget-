name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Triggers workflow when you push a tag like 'v1.0.4'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'


      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Regenerate Gradle Wrapper JAR
        working-directory: ./android
        run: gradle wrapper --gradle-version 8.7

      - name: Build and Sign Release APK
        working-directory: ./android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk Thirukkural-Widget-${{ github.ref_name }}.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: Thirukkural-Widget-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
