; ═══════════════════════════════════════════════════════════
;  Thirukkural Daily Widget for Rainmeter  v4.0
;  EWW Catppuccin Theme. Pure Lua.
;  Author: Bharath · MIT License
; ═══════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureKural "Daily"]

[Metadata]
Name=Thirukkural Daily EWW
Author=Bharath
Information=Daily Thirukkural widget matching EWW design (Catppuccin).
Version=4.0
License=MIT

[Variables]
KuralNum=1
Paal=அறத்துப்பால்
Line1=...
Line2=...
Urai=...

; Catppuccin Mocha Colors
BgColor=30,30,46,217
BorderColor=255,255,255,25
NumColor=249,226,175,255
PaalColor=137,180,250,255
TextColor=205,214,244,255
LabelColor=166,173,200,255
UraiColor=186,194,222,255

; ─────────────────────────────────────────────────────────
;  Script Measure
; ─────────────────────────────────────────────────────────
[MeasureKural]
Measure=Script
Script=#@#kural.lua
UpdateDivider=3600

[MeasureMidnight]
Measure=Time
Format=%H%M
IfMatch=0000
IfMatchAction=[!CommandMeasure MeasureKural "Daily"]

; ─────────────────────────────────────────────────────────
;  Background Card (Dynamic Height)
; ─────────────────────────────────────────────────────────
[MeterCard]
Meter=Shape
Shape=Rectangle 1,1,548,([MeterSpacer:Y] + 5),12 | Fill Color #BgColor# | Stroke Color #BorderColor# | StrokeWidth 1
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Header: Kural ID + Paal
; ─────────────────────────────────────────────────────────
[MeterKuralID]
Meter=String
Text=குறள் #KuralNum#
X=22
Y=22
FontFace=Kabilar
FontSize=12
FontWeight=800
FontColor=#NumColor#
AntiAlias=1
DynamicVariables=1

[MeterPaal]
Meter=String
Text=—  #Paal#
X=12R
Y=24
FontFace=Kabilar
FontSize=11
FontWeight=600
FontColor=#PaalColor#
AntiAlias=1
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Kural Text
; ─────────────────────────────────────────────────────────
[MeterLine1]
Meter=String
Text=#Line1#
X=22
Y=44
W=506
FontFace=Kabilar
FontWeight=800
FontSize=14
FontColor=#TextColor#
AntiAlias=1
DynamicVariables=1

[MeterLine2]
Meter=String
Text=#Line2#
X=22
Y=6R
W=506
FontFace=Kabilar
FontWeight=800
FontSize=14
FontColor=#TextColor#
AntiAlias=1
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Commentary
; ─────────────────────────────────────────────────────────
[MeterUraiLabel]
Meter=String
Text=கலைஞர் உரை:
X=22
Y=16R
FontFace=Kabilar
FontWeight=800
FontSize=10
FontColor=#LabelColor#
AntiAlias=1

[MeterUrai]
Meter=String
Text=#Urai#
X=22
Y=4R
W=506
FontFace=Kabilar
FontWeight=500
FontSize=11
FontColor=#UraiColor#
AntiAlias=1
LineSpacing=3
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Spacer for Dynamic Height
; ─────────────────────────────────────────────────────────
[MeterSpacer]
Meter=String
Text=
X=0
Y=22R
H=1
