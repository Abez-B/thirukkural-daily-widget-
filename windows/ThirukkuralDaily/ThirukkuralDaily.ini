; ═══════════════════════════════════════════════════════════
;  Thirukkural Daily Widget for Rainmeter v2.1
;  Design: Monochromatic dark — matches Android app aesthetic
;  Author: Bharath · MIT License
; ═══════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureDaily "Run"]

[Metadata]
Name=Thirukkural Daily
Author=Bharath
Information=Daily Thirukkural widget. Dark monochrome. Offline. Open Source.
Version=2.1
License=MIT

; ───────────────────────────────────────────────────────────
;  Variables
;  NOTE: variables.inc is pre-shipped with Kural #1.
;        Python overwrites it on every refresh with today's Kural.
; ───────────────────────────────────────────────────────────
[Variables]
@Include=#@#variables.inc

; Static colors — never overridden by variables.inc
BgColor=15,15,15,235
BorderColor=34,34,34,255
TextPrimary=245,245,245,255
TextSecondary=160,160,160,255
TextMuted=80,80,80,255
BtnColor=110,110,110,255
BtnActive=210,210,210,255

; ───────────────────────────────────────────────────────────
;  Measures
; ───────────────────────────────────────────────────────────

; Auto-refresh at midnight
[MeasureMidnight]
Measure=Time
Format=%H%M
IfMatch=0000
IfMatchAction=[!CommandMeasure MeasureDaily "Run"]

; run.bat tries python → py → python3 in sequence
[MeasureDaily]
Measure=Plugin
Plugin=RunCommand
Program=cmd
Parameter=/c "#@#run.bat" --daily
Hidden=1
OutputType=ANSI
FinishAction=[!Refresh]

[MeasureRandom]
Measure=Plugin
Plugin=RunCommand
Program=cmd
Parameter=/c "#@#run.bat" --random
Hidden=1
OutputType=ANSI
FinishAction=[!Refresh]

[MeasurePrev]
Measure=Plugin
Plugin=RunCommand
Program=cmd
Parameter=/c "#@#run.bat" --prev
Hidden=1
OutputType=ANSI
FinishAction=[!Refresh]

; ───────────────────────────────────────────────────────────
;  Background Card
; ───────────────────────────────────────────────────────────
[MeterCard]
Meter=Shape
Shape=Rectangle 0,0,520,1,14 | Fill Color #BgColor# | Stroke Color #BorderColor# | StrokeWidth 1
UpdateDivider=-1
LeftMouseUpAction=[!CommandMeasure MeasureDaily "Run"]
ToolTipText=Click to return to today's Kural

; ───────────────────────────────────────────────────────────
;  Header: Kural ID badge + Breadcrumb (Paal › Adhigaram)
; ───────────────────────────────────────────────────────────
[MeterIDBadge]
Meter=Shape
Shape=Rectangle 22,18,80,22,5 | Fill Color 34,34,34,255 | Stroke Color 50,50,50,200
UpdateDivider=-1

[MeterKuralID]
Meter=String
Text=#KuralID#
X=30
Y=21
W=64
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextSecondary#
AntiAlias=1
StringAlign=Left

[MeterBreadcrumb]
Meter=String
Text=#Breadcrumb#
X=112
Y=22
W=280
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextMuted#
AntiAlias=1

; ───────────────────────────────────────────────────────────
;  Kural Lines
; ───────────────────────────────────────────────────────────
[MeterLine1]
Meter=String
Text=#Line1#
X=22
Y=54
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1

[MeterLine2]
Meter=String
Text=#Line2#
X=22
Y=6R
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1

; ───────────────────────────────────────────────────────────
;  Divider
; ───────────────────────────────────────────────────────────
[MeterDivider]
Meter=Shape
Shape=Line 22,0,498,0 | Stroke Color 40,40,40,255 | StrokeWidth 1
Y=14R
UpdateDivider=-1

; ───────────────────────────────────────────────────────────
;  Commentary — full text, no height clipping
; ───────────────────────────────────────────────────────────
[MeterUraiLabel]
Meter=String
Text=#UraiTitle#
X=22
Y=14R
FontFace=TAU-Kabilar
FontSize=9
FontColor=#TextMuted#
AntiAlias=1

[MeterUrai]
Meter=String
Text=#Urai#
X=22
Y=8R
W=476
FontFace=TAU-Kabilar
FontSize=12
FontColor=#TextSecondary#
AntiAlias=1
LineSpacing=3

; ───────────────────────────────────────────────────────────
;  Action Buttons (top-right corner)
;  All button text HARDCODED — no variable dependency.
;  Only PrevBtn uses a variable (← when history exists, · when not)
; ───────────────────────────────────────────────────────────

; Previous (← or · depending on history)
[MeterBtnPrev]
Meter=String
Text=#PrevBtn#
X=406
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnPrev FontColor "#BtnActive#"][!UpdateMeter MeterBtnPrev][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnPrev FontColor "#BtnColor#"][!UpdateMeter MeterBtnPrev][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasurePrev "Run"]
ToolTipText=Go to previous Kural

; Random — hardcoded, no variable
[MeterBtnRandom]
Meter=String
Text=⇄
X=442
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnRandom FontColor "#BtnActive#"][!UpdateMeter MeterBtnRandom][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnRandom FontColor "#BtnColor#"][!UpdateMeter MeterBtnRandom][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureRandom "Run"]
ToolTipText=Show a random Kural

; Copy to clipboard — hardcoded, no variable
[MeterBtnCopy]
Meter=String
Text=⎘
X=476
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnCopy FontColor "#BtnActive#"][!UpdateMeter MeterBtnCopy][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnCopy FontColor "#BtnColor#"][!UpdateMeter MeterBtnCopy][!Redraw]
LeftMouseUpAction=[!SetClip "#Line1# #Line2# — #KuralID#, #Breadcrumb#"]
ToolTipText=Copy Kural to clipboard

; ───────────────────────────────────────────────────────────
;  Spacer — anchors DynamicWindowSize to bottom of commentary
; ───────────────────────────────────────────────────────────
[MeterSpacer]
Meter=String
Text=
X=0
Y=20R
H=1
