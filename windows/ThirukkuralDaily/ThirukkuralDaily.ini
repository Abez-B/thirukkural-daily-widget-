; ═══════════════════════════════════════════════════════════
;  Thirukkural Daily Widget for Rainmeter
;  Design: Monochromatic dark — matches Android app aesthetic
;  Author: Bharath · MIT License
; ═══════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureDaily "Run"]

[Metadata]
Name=Thirukkural Daily
Author=Bharath
Information=A daily Thirukkural flashcard widget. Dark monochrome. Offline.
Version=2.0
License=MIT

; ───────────────────────────────────────────────────────────
;  Variables — Colors (Dark Monochrome, matches Android app)
; ───────────────────────────────────────────────────────────
[Variables]
@Include=#@#variables.inc

; Card
BgColor=15,15,15,235
BorderColor=34,34,34,255
CardRadius=14

; Typography
TextPrimary=245,245,245,255
TextSecondary=160,160,160,255
TextMuted=80,80,80,255
AccentColor=220,220,220,255

; Layout — card dimensions
CardW=520
CardH=0
PadX=22
PadY=20

; Button colors
BtnColor=100,100,100,255
BtnHover=200,200,200,255

; ───────────────────────────────────────────────────────────
;  Measures
; ───────────────────────────────────────────────────────────

; Auto-refresh at midnight each day
[MeasureMidnight]
Measure=Time
Format=%H%M
IfMatch=0000
IfMatchAction=[!CommandMeasure MeasureDaily "Run"]

; Run Python — daily (reset to today)
[MeasureDaily]
Measure=Plugin
Plugin=RunCommand
Program=pythonw
Parameter="#@#fetch_kural.py" --daily
Hidden=1
OutputType=ANSI
FinishAction=[!Refresh]

; Run Python — random kural
[MeasureRandom]
Measure=Plugin
Plugin=RunCommand
Program=pythonw
Parameter="#@#fetch_kural.py" --random
Hidden=1
OutputType=ANSI
FinishAction=[!Refresh]

; Run Python — previous kural (pop history)
[MeasurePrev]
Measure=Plugin
Plugin=RunCommand
Program=pythonw
Parameter="#@#fetch_kural.py" --prev
Hidden=1
OutputType=ANSI
FinishAction=[!Refresh]

; ───────────────────────────────────────────────────────────
;  Background Card
; ───────────────────────────────────────────────────────────
[MeterCard]
Meter=Shape
Shape=Rectangle 0,0,520,1,#CardRadius# | Fill Color #BgColor# | Stroke Color #BorderColor# | StrokeWidth 1
UpdateDivider=-1
; Left-click card background returns to today
LeftMouseUpAction=[!CommandMeasure MeasureDaily "Run"]
ToolTipText=Tap to return to today's Kural

; ───────────────────────────────────────────────────────────
;  Header Row: Kural ID chip · breadcrumb
; ───────────────────────────────────────────────────────────

; Kural number badge background
[MeterIDBadge]
Meter=Shape
Shape=Rectangle 22,18,76,22,5 | Fill Color 34,34,34,255 | Stroke Color 50,50,50,200
UpdateDivider=-1

; Kural number text — e.g. "குறள் 42"
[MeterKuralID]
Meter=String
Text=#KuralID#
X=30
Y=20
W=70
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextSecondary#
AntiAlias=1
StringAlign=Left

; Breadcrumb — "Paal › Adhigaram"
[MeterBreadcrumb]
Meter=String
Text=#Breadcrumb#
X=108
Y=22
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextMuted#
AntiAlias=1

; ───────────────────────────────────────────────────────────
;  Kural Lines (Tamil couplet)
; ───────────────────────────────────────────────────────────
[MeterLine1]
Meter=String
Text=#Line1#
X=22
Y=54
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1

[MeterLine2]
Meter=String
Text=#Line2#
X=22
Y=6R
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1

; ───────────────────────────────────────────────────────────
;  Divider
; ───────────────────────────────────────────────────────────
[MeterDivider]
Meter=Shape
Shape=Line 22,0,498,0 | Stroke Color 35,35,35,255 | StrokeWidth 1
Y=14R
UpdateDivider=-1

; ───────────────────────────────────────────────────────────
;  Commentary section
; ───────────────────────────────────────────────────────────

; "கலைஞர் உரை" label
[MeterUraiLabel]
Meter=String
Text=#UraiTitle#
X=22
Y=12R
FontFace=TAU-Kabilar
FontSize=9
FontColor=#TextMuted#
AntiAlias=1
StringCase=Upper

; Commentary body
[MeterUrai]
Meter=String
Text=#Urai#
X=22
Y=6R
W=476
ClipString=2
ClipStringW=476
ClipStringH=52
FontFace=TAU-Kabilar
FontSize=12
FontColor=#TextSecondary#
AntiAlias=1
LineSpacing=2

; ───────────────────────────────────────────────────────────
;  Action Buttons — top right corner (← ⟳ ↗)
; ───────────────────────────────────────────────────────────

; Back button (←) — shows · when no history
[MeterBtnPrev]
Meter=String
Text=#PrevBtn#
X=416
Y=16
W=28
H=28
FontFace=Segoe UI
FontSize=14
FontColor=#BtnColor#
AntiAlias=1
StringAlign=Center
MouseOverAction=[!SetOption MeterBtnPrev FontColor "200,200,200,255"][!UpdateMeter MeterBtnPrev][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnPrev FontColor "100,100,100,255"][!UpdateMeter MeterBtnPrev][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasurePrev "Run"]
ToolTipText=Previous Kural

; Random button (⟳)
[MeterBtnRandom]
Meter=String
Text=#RandomBtn#
X=450
Y=16
W=28
H=28
FontFace=Segoe UI
FontSize=15
FontColor=#BtnColor#
AntiAlias=1
StringAlign=Center
MouseOverAction=[!SetOption MeterBtnRandom FontColor "200,200,200,255"][!UpdateMeter MeterBtnRandom][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnRandom FontColor "100,100,100,255"][!UpdateMeter MeterBtnRandom][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureRandom "Run"]
ToolTipText=Random Kural

; Share/Copy button (↗)
[MeterBtnShare]
Meter=String
Text=#ShareBtn#
X=484
Y=16
W=28
H=28
FontFace=Segoe UI
FontSize=14
FontColor=#BtnColor#
AntiAlias=1
StringAlign=Center
MouseOverAction=[!SetOption MeterBtnShare FontColor "200,200,200,255"][!UpdateMeter MeterBtnShare][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnShare FontColor "100,100,100,255"][!UpdateMeter MeterBtnShare][!Redraw]
LeftMouseUpAction=[!SetClip "#Line1# #Line2# — #KuralID#, #Breadcrumb#"]
ToolTipText=Copy Kural to clipboard

; ───────────────────────────────────────────────────────────
;  Bottom padding spacer (forces DynamicWindowSize)
; ───────────────────────────────────────────────────────────
[MeterSpacer]
Meter=String
Text=
X=0
Y=16R
H=4
