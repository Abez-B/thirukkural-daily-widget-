; ═══════════════════════════════════════════════════════════
;  Thirukkural Daily Widget for Rainmeter  v3.0
;  No Python. No installs. Pure Lua + Rainmeter.
;  Author: Bharath · MIT License
; ═══════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureKural "Daily"]

[Metadata]
Name=Thirukkural Daily
Author=Bharath
Information=Daily Thirukkural widget. Offline. No Python needed. Pure Lua.
Version=3.0
License=MIT

; ─────────────────────────────────────────────────────────
;  Variables — defaults shown until Lua populates them
; ─────────────────────────────────────────────────────────
[Variables]
; Dynamic — set by kural.lua on every load
KuralNum=1
Breadcrumb=அறத்துப்பால்  ›  கடவுள் வாழ்த்து
Line1=அகர முதல எழுத்தெல்லாம் ஆதி
Line2=பகவன் முதற்றே உலகு.
Urai=அகரம் எழுத்துக்களுக்கு முதன்மை; ஆதிபகவன் உலகில் வாழும் உயிர்களுக்கு முதன்மை.
PrevBtn=·

; Static — colors and layout (never changed by Lua)
BgColor=15,15,15,235
BorderColor=34,34,34,255
TextPrimary=245,245,245,255
TextSecondary=160,160,160,255
TextMuted=80,80,80,255
BtnColor=110,110,110,255
BtnActive=210,210,210,255

; ─────────────────────────────────────────────────────────
;  Script Measure  (the only measure — Lua handles everything)
; ─────────────────────────────────────────────────────────
[MeasureKural]
Measure=Script
Script=#@#kural.lua
UpdateDivider=3600

; Auto-refresh at midnight (checks every minute)
[MeasureMidnight]
Measure=Time
Format=%H%M
IfMatch=0000
IfMatchAction=[!CommandMeasure MeasureKural "Daily"]

; ─────────────────────────────────────────────────────────
;  Background card
; ─────────────────────────────────────────────────────────
[MeterCard]
Meter=Shape
Shape=Rectangle 0,0,520,1,14 | Fill Color #BgColor# | Stroke Color #BorderColor# | StrokeWidth 1
UpdateDivider=-1
LeftMouseUpAction=[!CommandMeasure MeasureKural "Daily"]
ToolTipText=Click to return to today's Kural

; ─────────────────────────────────────────────────────────
;  Header: badge + breadcrumb
; ─────────────────────────────────────────────────────────
[MeterIDBadge]
Meter=Shape
Shape=Rectangle 22,18,84,22,5 | Fill Color 34,34,34,255 | Stroke Color 50,50,50,200
UpdateDivider=-1

; "குறள் N" — static Tamil prefix + dynamic number
[MeterKuralID]
Meter=String
Text=குறள் #KuralNum#
X=30
Y=21
W=70
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextSecondary#
AntiAlias=1

[MeterBreadcrumb]
Meter=String
Text=#Breadcrumb#
X=116
Y=22
W=270
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextMuted#
AntiAlias=1

; ─────────────────────────────────────────────────────────
;  Kural couplet
; ─────────────────────────────────────────────────────────
[MeterLine1]
Meter=String
Text=#Line1#
X=22
Y=54
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1

[MeterLine2]
Meter=String
Text=#Line2#
X=22
Y=6R
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1

; ─────────────────────────────────────────────────────────
;  Divider
; ─────────────────────────────────────────────────────────
[MeterDivider]
Meter=Shape
Shape=Line 22,0,498,0 | Stroke Color 40,40,40,255 | StrokeWidth 1
Y=14R
UpdateDivider=-1

; ─────────────────────────────────────────────────────────
;  Commentary — full text, no height limit
; ─────────────────────────────────────────────────────────
[MeterUraiLabel]
Meter=String
Text=கலைஞர் உரை
X=22
Y=14R
FontFace=TAU-Kabilar
FontSize=9
FontColor=#TextMuted#
AntiAlias=1

[MeterUrai]
Meter=String
Text=#Urai#
X=22
Y=8R
W=476
FontFace=TAU-Kabilar
FontSize=12
FontColor=#TextSecondary#
AntiAlias=1
LineSpacing=3

; ─────────────────────────────────────────────────────────
;  Action Buttons (top-right corner)
; ─────────────────────────────────────────────────────────

; ← Previous  (dynamic: shows · when no history)
[MeterBtnPrev]
Meter=String
Text=#PrevBtn#
X=406
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnPrev FontColor "#BtnActive#"][!UpdateMeter MeterBtnPrev][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnPrev FontColor "#BtnColor#"][!UpdateMeter MeterBtnPrev][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureKural "Previous"]
ToolTipText=Previous Kural

; ⇄ Random — hardcoded
[MeterBtnRandom]
Meter=String
Text=⇄
X=442
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnRandom FontColor "#BtnActive#"][!UpdateMeter MeterBtnRandom][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnRandom FontColor "#BtnColor#"][!UpdateMeter MeterBtnRandom][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureKural "Random"]
ToolTipText=Random Kural

; ⎘ Copy to clipboard — hardcoded
[MeterBtnCopy]
Meter=String
Text=⎘
X=476
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnCopy FontColor "#BtnActive#"][!UpdateMeter MeterBtnCopy][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnCopy FontColor "#BtnColor#"][!UpdateMeter MeterBtnCopy][!Redraw]
LeftMouseUpAction=[!SetClip "குறள் #KuralNum# — #Line1# #Line2# (#Breadcrumb#)"]
ToolTipText=Copy Kural to clipboard

; ─────────────────────────────────────────────────────────
;  Spacer (anchors DynamicWindowSize below commentary)
; ─────────────────────────────────────────────────────────
[MeterSpacer]
Meter=String
Text=
X=0
Y=20R
H=1
