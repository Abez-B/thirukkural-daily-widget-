; ═══════════════════════════════════════════════════════════
;  Thirukkural Daily Widget for Rainmeter  v3.1
;  No Python. No installs. Pure Lua + Rainmeter.
;  Author: Bharath · MIT License
; ═══════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
; Dark background fills the whole skin — no separate card shape needed
BackgroundMode=2
BackgroundColor=15,15,15,235
SkinWidth=520
OnRefreshAction=[!CommandMeasure MeasureKural "Daily"]

[Metadata]
Name=Thirukkural Daily
Author=Bharath
Information=Daily Thirukkural widget. Offline. No Python needed. Pure Lua.
Version=3.1
License=MIT

; ─────────────────────────────────────────────────────────
;  Variables — ASCII defaults only (avoids UTF-8 INI issues)
;  Lua overwrites these immediately via !SetVariable on load.
; ─────────────────────────────────────────────────────────
[Variables]
KuralNum=1
Breadcrumb=Aratthuppaal - Kadavul Vaazhthu
Line1=...
Line2=...
Urai=...
PrevBtn=-
BgColor=15,15,15,235
BorderColor=34,34,34,255
TextPrimary=245,245,245,255
TextSecondary=160,160,160,255
TextMuted=80,80,80,255
BtnColor=110,110,110,255
BtnActive=210,210,210,255

; ─────────────────────────────────────────────────────────
;  Script Measure  — Lua handles all logic
; ─────────────────────────────────────────────────────────
[MeasureKural]
Measure=Script
Script=#@#kural.lua
UpdateDivider=3600

; Auto-refresh at midnight
[MeasureMidnight]
Measure=Time
Format=%H%M
IfMatch=0000
IfMatchAction=[!CommandMeasure MeasureKural "Daily"]

; ─────────────────────────────────────────────────────────
;  Rounded border overlay  (drawn on top of BackgroundMode fill)
; ─────────────────────────────────────────────────────────
[MeterBorder]
Meter=Shape
Shape=Rectangle 1,1,518,1,13 | Fill Color 0,0,0,0 | Stroke Color #BorderColor# | StrokeWidth 1
UpdateDivider=-1

; ─────────────────────────────────────────────────────────
;  Header: Kural ID badge + Breadcrumb
; ─────────────────────────────────────────────────────────
[MeterIDBadge]
Meter=Shape
Shape=Rectangle 22,18,84,22,5 | Fill Color 34,34,34,255 | Stroke Color 50,50,50,200
UpdateDivider=-1

; "Kural N" — static label + dynamic number from Lua
[MeterKuralID]
Meter=String
Text=Kural #KuralNum#
X=30
Y=21
W=70
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextSecondary#
AntiAlias=1
DynamicVariables=1

[MeterBreadcrumb]
Meter=String
Text=#Breadcrumb#
X=116
Y=22
W=270
FontFace=TAU-Kabilar
FontSize=10
FontColor=#TextMuted#
AntiAlias=1
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Kural couplet
; ─────────────────────────────────────────────────────────
[MeterLine1]
Meter=String
Text=#Line1#
X=22
Y=56
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1
DynamicVariables=1

[MeterLine2]
Meter=String
Text=#Line2#
X=22
Y=6R
W=476
FontFace=TAU-Kabilar
FontWeight=700
FontSize=18
FontColor=#TextPrimary#
AntiAlias=1
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Divider
; ─────────────────────────────────────────────────────────
[MeterDivider]
Meter=Shape
Shape=Line 22,0,498,0 | Stroke Color 40,40,40,255 | StrokeWidth 1
Y=14R
UpdateDivider=-1

; ─────────────────────────────────────────────────────────
;  Commentary — full text, no clipping
; ─────────────────────────────────────────────────────────
[MeterUraiLabel]
Meter=String
Text=KALAIGNAR URAI
X=22
Y=14R
FontFace=Segoe UI
FontSize=8
FontColor=#TextMuted#
AntiAlias=1

[MeterUrai]
Meter=String
Text=#Urai#
X=22
Y=8R
W=476
FontFace=TAU-Kabilar
FontSize=12
FontColor=#TextSecondary#
AntiAlias=1
LineSpacing=3
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Buttons — top right corner
;  ALL text hardcoded except PrevBtn which Lua controls
; ─────────────────────────────────────────────────────────

[MeterBtnPrev]
Meter=String
Text=#PrevBtn#
X=400
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
DynamicVariables=1
MouseOverAction=[!SetOption MeterBtnPrev FontColor "#BtnActive#"][!UpdateMeter MeterBtnPrev][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnPrev FontColor "#BtnColor#"][!UpdateMeter MeterBtnPrev][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureKural "Previous"]
ToolTipText=Previous Kural

[MeterBtnRandom]
Meter=String
Text=~
X=438
Y=13
FontFace=Segoe UI
FontSize=18
FontWeight=700
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnRandom FontColor "#BtnActive#"][!UpdateMeter MeterBtnRandom][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnRandom FontColor "#BtnColor#"][!UpdateMeter MeterBtnRandom][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureKural "Random"]
ToolTipText=Random Kural

[MeterBtnCopy]
Meter=String
Text=^
X=476
Y=13
FontFace=Segoe UI
FontSize=16
FontColor=#BtnColor#
AntiAlias=1
MouseOverAction=[!SetOption MeterBtnCopy FontColor "#BtnActive#"][!UpdateMeter MeterBtnCopy][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnCopy FontColor "#BtnColor#"][!UpdateMeter MeterBtnCopy][!Redraw]
LeftMouseUpAction=[!SetClip "Kural #KuralNum# | #Line1# #Line2# | #Breadcrumb#"]
ToolTipText=Copy Kural to clipboard
DynamicVariables=1

; ─────────────────────────────────────────────────────────
;  Spacer — forces DynamicWindowSize to fit commentary
; ─────────────────────────────────────────────────────────
[MeterSpacer]
Meter=String
Text=
X=0
Y=20R
H=1
