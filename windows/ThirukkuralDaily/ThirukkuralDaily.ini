[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Thirukural Daily
Author=Bharath
Information=A daily Thirukkural flashcard widget.
Version=1.0
License=MIT

[Variables]
@Include=#@#variables.inc
; Colors (Catppuccin Mocha)
BgColor=30,30,46,230
BorderColor=49,50,68,255
Yellow=249,226,175,255
Blue=137,180,250,255
TextPrimary=205,214,244,255
TextSecondary=166,173,200,255
TextTertiary=186,194,222,255

; --- Measures ---
[MeasureAutoUpdate]
Measure=Time
Format=%M
IfMatch=00
IfMatchAction=[!CommandMeasure MeasureRunPython "Run"]

[MeasureRunPython]
Measure=Plugin
Plugin=RunCommand
Program=python
Parameter="#@#fetch_kural.py"
State=Hide
OutputType=ANSI
FinishAction=[!Refresh]

[MeasureRunPythonRandom]
Measure=Plugin
Plugin=RunCommand
Program=python
Parameter="#@#fetch_kural.py" --random
State=Hide
OutputType=ANSI
FinishAction=[!Refresh]

; --- Background ---
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,520,220,12 | Fill Color #BgColor# | Stroke Color #BorderColor#
UpdateDivider=-1
LeftMouseUpAction=[!CommandMeasure MeasureRunPython "Run"]
ToolTipText=Tap to return to today's Kural

; --- Header ---
[MeterHeaderID]
Meter=String
Text=#KuralID#
X=25
Y=25
FontFace=TAU-Kabilar
FontWeight=700
FontColor=#Yellow#
FontSize=13
AntiAlias=1

[MeterHeaderDash]
Meter=String
Text=#Dash#
X=10R
Y=23
FontFace=Segoe UI
FontColor=#TextSecondary#
FontSize=13
AntiAlias=1

[MeterHeaderPaal]
Meter=String
Text=#Paal#
X=10R
Y=25
FontFace=TAU-Kabilar
FontColor=#Blue#
FontSize=13
AntiAlias=1

; --- Randomizer Dice ---
[MeterDice]
Meter=String
Text=#Dice#
X=480
Y=20
FontFace=Segoe UI Emoji
FontSize=16
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureRunPythonRandom "Run"]
ToolTipText=Roll a random Kural!

; --- Kural ---
[MeterKuralLine1]
Meter=String
Text=#Line1#
X=25
Y=60
FontFace=TAU-Kabilar
FontWeight=700
FontColor=#TextPrimary#
FontSize=17
AntiAlias=1

[MeterKuralLine2]
Meter=String
Text=#Line2#
X=25
Y=10R
FontFace=TAU-Kabilar
FontWeight=700
FontColor=#TextPrimary#
FontSize=17
AntiAlias=1

; --- Urai Title ---
[MeterUraiTitleLabel]
Meter=String
Text=#UraiTitle#
X=25
Y=20R
FontFace=TAU-Kabilar
FontWeight=700
FontColor=#TextSecondary#
FontSize=11
AntiAlias=1

; --- Urai Body ---
[MeterUrai]
Meter=String
Text=#Urai#
X=25
Y=10R
W=470
ClipString=2
FontFace=TAU-Kabilar
FontColor=#TextTertiary#
FontSize=12
AntiAlias=1
