plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.abezb.thirukuraldaily'
    compileSdk 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        applicationId "com.abezb.thirukuraldaily"
        minSdk 26
        targetSdk 34
        versionCode 14
        versionName "1.1.4"
    }

    signingConfigs {
        release {
            def keystoreFile = new File("release.keystore")
            if (System.getenv("KEYSTORE_BASE64") != null) {
                def decodedBytes = Base64.getDecoder().decode(System.getenv("KEYSTORE_BASE64").replaceAll("\\s", ""))
                keystoreFile.withOutputStream { it.write(decodedBytes) }
            }
            storeFile keystoreFile
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEYSTORE_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
